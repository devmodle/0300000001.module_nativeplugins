apply plugin: 'com.android.library'

android {
    compileSdkVersion 29
    buildToolsVersion "30.0.2"

    defaultConfig {
        minSdkVersion 21
        targetSdkVersion 29

        multiDexEnabled true
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    lintOptions {
        abortOnError false
    }
}

dependencies {
    compileOnly fileTree(dir: "libs", include: ["*.jar"])
    implementation 'androidx.appcompat:appcompat:1.2.0'
    implementation 'com.google.android.play:core:1.8.0'

    testImplementation 'junit:junit:4.12'
    androidTestImplementation 'androidx.test.ext:junit:1.1.2'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.3.0'
}

// 이전 라이브러리 파일을 제거한다
task removePrevLibrary(type: Delete) {
    delete '../../../Assets/Plugins/Android/CustomAndroidPlugin.aar'
}

// 라이브러리 파일을 생성한다
task exportLibrary(type: Copy) {
    from('build/outputs/aar/')
    into('../../../Assets/Plugins/Android/')

    include('app-release.aar')
    rename('app-release.aar', 'CustomAndroidPlugin.aar')
}

exportLibrary.dependsOn(removePrevLibrary, assemble, build)
