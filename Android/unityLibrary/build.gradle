// GENERATED BY UNITY. REMOVE THIS COMMENT TO PREVENT OVERWRITING WHEN EXPORTING AGAIN

apply plugin: 'com.android.library'

dependencies {
    compileOnly fileTree(dir: 'libs', include: ['*.jar'])
}

android {
    compileSdkVersion 30
    buildToolsVersion '30.0.2'

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    defaultConfig {
        minSdkVersion 22
        targetSdkVersion 30

        multiDexEnabled true
        consumerProguardFiles 'proguard-unity.txt'
    }
    lintOptions {
        abortOnError false
    }
    aaptOptions {
        noCompress = ['.ress', '.resource', '.obb'] + unityStreamingAssets.tokenize(', ')
        ignoreAssetsPattern = "!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~"
    }
    packagingOptions {
        doNotStrip '*/armeabi-v7a/*.so'
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

// 플러그인을 생성한다
task exportPlugin(type: Copy) {
    from('build/outputs/aar/')
    into('../../../Assets/Plugins/Android/')

    include('unityLibrary-release.aar')
    rename('unityLibrary-release.aar', 'CustomAndroidPlugin.aar')
}

// 플러그인을 제거한다
task removePrevPlugin(type: Delete) {
    delete '../../../Assets/Plugins/Android/CustomAndroidPlugin.aar'
}

exportPlugin.dependsOn(removePrevPlugin, assemble, build)
